[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM5
monitor_port = COM5
lib_deps =
    links2004/WebSockets@^2.6.1
    bblanchon/ArduinoJson@^7.4.2
    adafruit/Adafruit PWM Servo Driver Library@^3.0.2
build_flags =
    -DCORE_DEBUG_LEVEL=1
